<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miei Ordini - ᗰIᑕKY ᔕTOᖇE</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .orders-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .orders-header h2 {
            font-size: 28px;
            color: #333;
        }

        .orders-stats {
            display: flex;
            gap: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #e91e63 0%, #c2185b 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
            min-width: 120px;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-card .label {
            font-size: 12px;
            opacity: 0.9;
        }

        .orders-list {
            display: grid;
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 25px;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .order-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .order-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .order-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .order-number {
            color: #e91e63;
            font-size: 18px;
        }

        .order-products {
            margin-bottom: 20px;
        }

        .order-products h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-name {
            color: #333;
        }

        .product-price {
            color: #e91e63;
            font-weight: bold;
        }

        .order-footer {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: center;
        }

        .shipping-address {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .shipping-address strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .order-total {
            text-align: right;
        }

        .total-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .total-amount {
            font-size: 28px;
            color: #e91e63;
            font-weight: bold;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .empty-icon {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-text {
            color: #999;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-subtext {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn-shop {
            display: inline-block;
            background: linear-gradient(135deg, #e91e63 0%, #c2185b 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-shop:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.3);
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        .payment-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .payment-badge.visa {
            background: #1434CB20;
            color: #1434CB;
        }

        .payment-badge.mastercard {
            background: #EB001B20;
            color: #EB001B;
        }

        .payment-badge.paypal {
            background: #00457C20;
            color: #00457C;
        }

        @media (max-width: 768px) {
            .order-header {
                grid-template-columns: 1fr;
            }

            .order-footer {
                grid-template-columns: 1fr;
            }

            .orders-stats {
                flex-direction: column;
                width: 100%;
            }

            .stat-card {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Header e Navigazione -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <img src="1768777026909.jpg" alt="Logo ᗰIᑕKY ᔕTOᖇE" class="logo-img">
                    <h1 class="store-name">ᗰIᑕKY ᔕTOᖇE</h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="prodotti.html">Prodotti</a></li>
                    <li><a href="ordini-admin.html" class="active"><i class="fas fa-box"></i> Ordini</a></li>
                    <li><a href="index.html#contatti">Contatti</a></li>
                </ul>
                <div class="cart-icon">
                    <a href="carrello.html">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count" class="cart-count">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Ordini -->
    <section class="cart-section">
        <div class="orders-container">
            <div class="orders-header">
                <h2><i class="fas fa-box"></i> I Miei Ordini</h2>
                <div class="orders-stats">
                    <div class="stat-card">
                        <div class="number" id="total-orders">0</div>
                        <div class="label">Ordini Totali</div>
                    </div>
                    <div class="stat-card">
                        <div class="number" id="total-spent">€0</div>
                        <div class="label">Speso Totale</div>
                    </div>
                </div>
            </div>

            <div class="orders-list" id="orders-list">
                <!-- Gli ordini verranno caricati qui -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <!-- Footer copyright rimosso su richiesta -->
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="chat.js?v=3"></script>
    <script>
        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const ordersList = document.getElementById('orders-list');
            const totalOrdersEl = document.getElementById('total-orders');
            const totalSpentEl = document.getElementById('total-spent');

            totalOrdersEl.textContent = orders.length;

            if (orders.length === 0) {
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-inbox"></i>
                        </div>
                        <div class="empty-text">Nessun ordine ancora</div>
                        <div class="empty-subtext">Non hai effettuato nessun acquisto. Inizia a fare shopping!</div>
                        <a href="prodotti.html" class="btn-shop">
                            <i class="fas fa-shopping-bag"></i> Vai ai Prodotti
                        </a>
                    </div>
                `;
                totalSpentEl.textContent = '€0.00';
                return;
            }

            let totalSpent = 0;
            let html = '';

            // Ordina ordini dal più recente al più vecchio
            const sortedOrders = [...orders].reverse();

            sortedOrders.forEach((order, index) => {
                const orderTotal = order.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) + 4.99;
                totalSpent += orderTotal;

                let productsHTML = '';
                order.cart.forEach(item => {
                    productsHTML += `
                        <div class="product-item">
                            <span class="product-name">${item.name} <strong>x${item.quantity}</strong></span>
                            <span class="product-price">€${(item.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `;
                });

                const paymentClass = order.paymentMethod.toLowerCase().replace(' ', '');
                const paymentLabel = order.paymentMethod === 'visa' ? 'Visa' :
                    order.paymentMethod === 'mastercard' ? 'Mastercard' :
                        order.paymentMethod === 'paypal' ? 'PayPal' : order.paymentMethod;

                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="order-info">
                                <span class="order-label">Numero Ordine</span>
                                <span class="order-value order-number">#${Date.now() + index}</span>
                            </div>
                            <div class="order-info">
                                <span class="order-label">Data</span>
                                <span class="order-value">${order.timestamp}</span>
                            </div>
                            <div class="order-info">
                                <span class="order-label">Metodo di Pagamento</span>
                                <span class="order-value">
                                    <span class="payment-badge ${paymentClass}">${paymentLabel}</span>
                                </span>
                            </div>
                            <div class="order-info">
                                <span class="order-label">Stato</span>
                                <span class="order-value"><i class="fas fa-check-circle"></i> Confermato</span>
                            </div>
                        </div>

                        <div class="order-products">
                            <h4><i class="fas fa-shopping-bag"></i> Prodotti</h4>
                            ${productsHTML}
                        </div>

                        <div class="order-footer">
                            <div class="shipping-address">
                                <strong><i class="fas fa-map-marker-alt"></i> Indirizzo di Spedizione</strong>
                                ${order.fullName}<br>
                                ${order.address}<br>
                                ${order.city} ${order.postalCode}<br>
                                ${order.country}<br>
                                <strong style="margin-top: 10px; display: block;">Contatti</strong>
                                Email: ${order.email}<br>
                                Telefono: ${order.phone}
                                <div class="order-actions">
                                    <button class="btn-delete" onclick="deleteOrder(${orders.length - 1 - index})">
                                        <i class="fas fa-trash"></i> Cancella Ordine
                                    </button>
                                </div>
                            </div>
                            <div class="order-total">
                                <div class="total-label">Totale Ordine</div>
                                <div class="total-amount">€${orderTotal.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            ordersList.innerHTML = html;
            totalSpentEl.textContent = '€' + totalSpent.toFixed(2);
        }

        function deleteOrder(index) {
            if (confirm('Sei sicuro di voler cancellare questo ordine? Questa azione non può essere annullata.')) {
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                orders.splice(index, 1);
                localStorage.setItem('orders', JSON.stringify(orders));
                loadOrders();
            }
        }

        // Carica ordini al caricamento della pagina
        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>

</html>
