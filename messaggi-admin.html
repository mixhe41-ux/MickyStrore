<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header h1 i {
            color: #e91e63;
            margin-right: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #e91e63 0%, #c2185b 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-box .label {
            font-size: 14px;
            opacity: 0.9;
        }

        .messages-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .message-card {
            background: #f8f9fa;
            border-left: 4px solid #e91e63;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .message-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .message-card.unread {
            background: #fff3f8;
            border-left-color: #ff1744;
        }

        /* operator messages */
        .message-card.operator {
            background: #e3f2fd;
            border-left-color: #2196f3;
        }

        .message-card.operator .message-header .message-date i {
            color: #2196f3;
        }

        .message-card.operator .message-body {
            color: #0d47a1;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .message-date {
            color: #666;
            font-size: 14px;
        }

        .message-date i {
            margin-right: 5px;
        }

        .message-badge {
            background: #ff1744;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .message-body {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .message-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #e91e63;
            color: white;
        }

        .btn-primary:hover {
            background: #c2185b;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e91e63;
            background: white;
            color: #e91e63;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #e91e63;
            color: white;
        }

        .filter-btn:hover {
            background: #e91e63;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-inbox"></i>Messaggi Chat</h1>
            <div class="stats">
                <div class="stat-box">
                    <div class="number" id="total-messages">0</div>
                    <div class="label">Totali</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="unread-messages">0</div>
                    <div class="label">Non Letti</div>
                </div>
            </div>
        </div>

        <div class="admin-sections">
            <div id="section-messaggi" style="display:block">
                <!-- Messaggi chat -->
                <div class="messages-container">
                    <div class="actions-bar">
                        <div class="filter-buttons">
                            <button class="filter-btn active" onclick="filterMessages('all')">Tutti</button>
                            <button class="filter-btn" onclick="filterMessages('unread')">Non Letti</button>
                            <button class="filter-btn" onclick="filterMessages('read')">Letti</button>
                        </div>
                        <div>
                            <button class="btn btn-success" onclick="markAllRead()">
                                <i class="fas fa-check-double"></i> Segna tutti come letti
                            </button>
                            <button class="btn btn-danger" onclick="clearAllMessages()">
                                <i class="fas fa-trash"></i> Cancella tutti
                            </button>
                            <button class="btn btn-primary" onclick="showSection('iscritti')">
                                <i class="fas fa-users"></i> Visualizza Iscritti
                            </button>
                            <button class="btn btn-primary" onclick="showSection('ordini')">
                                <i class="fas fa-box"></i> Visualizza Ordini Ricevuti
                            </button>
                        </div>
                    </div>
                    <div id="messages-list">
                        <!-- I messaggi verranno caricati qui -->
                    </div>
                </div>
            </div>
            <div id="section-iscritti" style="display:none">
                <div class="messages-container">
                    <button class="btn btn-primary" onclick="showSection('messaggi')"><i class="fas fa-arrow-left"></i>
                        Torna ai Messaggi</button>
                    <h2 style="margin:20px 0 10px 0;color:#e91e63"><i class="fas fa-users"></i> Iscritti al negozio</h2>
                    <button class="btn btn-danger" onclick="deleteAllSubscribersAdmin()" style="margin-bottom:16px"><i
                            class="fas fa-trash"></i> Cancella tutti gli iscritti</button>
                    <ul id="subscribers-list" style="list-style:none; padding:0; max-height:300px; overflow-y:auto;">
                    </ul>
                </div>
            </div>
            <div id="section-ordini" style="display:none">
                <div class="messages-container">
                    <button class="btn btn-primary" onclick="showSection('messaggi')"><i class="fas fa-arrow-left"></i>
                        Torna ai Messaggi</button>
                    <h2 style="margin:20px 0 10px 0;color:#e91e63"><i class="fas fa-box"></i> Ordini Ricevuti</h2>
                    <div id="orders-list-admin"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modale Iscritti -->
    <div id="subscribers-modal"
        style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
        <div
            style="background:white; border-radius:12px; max-width:400px; width:90vw; margin:auto; padding:30px; position:relative; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
            <button onclick="closeSubscribers()"
                style="position:absolute; top:10px; right:15px; background:none; border:none; font-size:22px; color:#e91e63; cursor:pointer;">&times;</button>
            <h2 style="margin-bottom:20px; color:#e91e63;"><i class="fas fa-users"></i> Iscritti al negozio</h2>
            <ul id="subscribers-list" style="list-style:none; padding:0; max-height:300px; overflow-y:auto;"></ul>
        </div>
    </div>

    <script>
        // Rimosso il mockup: non vengono più aggiunti iscritti di esempio

        function showSubscribers() {
            const modal = document.getElementById('subscribers-modal');
            const list = document.getElementById('subscribers-list');

            // Email fittizie da eliminare
            const fakeEmails = [
                'mario.rossi@email.com',
                'luca.bianchi@email.com',
                'giulia.verdi@email.com'
            ];

            // Carica gli iscritti alla newsletter (se presente)
            const storedSubs = JSON.parse(localStorage.getItem('subscribers') || '[]');
            const filteredSubs = storedSubs.filter(s => !fakeEmails.includes((s.email || '').toLowerCase()));

            // Integra con i clienti registrati (se presenti)
            const clienti = JSON.parse(localStorage.getItem('clienti') || '[]');
            const filteredClienti = clienti.filter(c => !fakeEmails.includes((c.email || '').toLowerCase()));

            // Persisti la pulizia (rimuove definitivamente i finti utenti)
            if (filteredSubs.length !== storedSubs.length) {
                localStorage.setItem('subscribers', JSON.stringify(filteredSubs));
            }
            if (filteredClienti.length !== clienti.length) {
                localStorage.setItem('clienti', JSON.stringify(filteredClienti));
            }

            // Data di oggi (formattata) per i record senza data di iscrizione
            const today = new Date().toLocaleDateString('it-IT');

            // Se manca iscrittoIl, lo impostiamo automaticamente su oggi
            const subsWithDate = filteredSubs.map(s => ({
                ...s,
                iscrittoIl: s.iscrittoIl || s.subscribedOn || today
            }));
            const clientiWithDate = filteredClienti.map(c => ({
                ...c,
                iscrittoIl: c.iscrittoIl || c.subscribedOn || today
            }));

            // Salva la data anche in localStorage (tramite update automatico)
            localStorage.setItem('subscribers', JSON.stringify(subsWithDate));
            localStorage.setItem('clienti', JSON.stringify(clientiWithDate));

            const clientiSubs = clientiWithDate.map(c => ({
                username: c.username || c.name || 'Cliente',
                email: c.email,
                telefono: c.telefono || c.phone || '',
                indirizzo: c.address || c.indirizzo || '',
                cap: c.cap || '',
                city: c.city || '',
                country: c.country || '',
                isCliente: true,
                iscrittoIl: c.iscrittoIl
            }));

            // Normalizza e unisci iscritti (evita duplicati per email)
            const normalize = item => ({
                username: item.username || item.name || 'Cliente',
                email: item.email || item.mail || '',
                telefono: item.telefono || item.phone || '',
                indirizzo: item.address || item.indirizzo || '',
                cap: item.cap || '',
                city: item.city || '',
                country: item.country || '',
                isCliente: item.isCliente || false,
                isSubscriber: item.isSubscriber || false,
                iscrittoIl: item.iscrittoIl || item.subscribedOn || today
            });

            const merged = [...filteredSubs.map(normalize), ...clientiSubs.map(normalize)];
            const uniqueByEmail = Object.values(merged.reduce((acc, item) => {
                if (!item.email) return acc;
                if (!acc[item.email]) acc[item.email] = item;
                return acc;
            }, {}));

            if (uniqueByEmail.length === 0) {
                list.innerHTML = '<li>Nessun iscritto trovato.</li>';
            } else {
                list.innerHTML = `<table style="width:100%;border-collapse:collapse;margin-top:10px"><thead><tr style="background:#f5f5f5"><th style="padding:8px;border:1px solid #eee">Username</th><th style="padding:8px;border:1px solid #eee">Indirizzo</th><th style="padding:8px;border:1px solid #eee">CAP</th><th style="padding:8px;border:1px solid #eee">Città</th><th style="padding:8px;border:1px solid #eee">Paese</th><th style="padding:8px;border:1px solid #eee">Numero</th><th style="padding:8px;border:1px solid #eee">Mail</th><th style="padding:8px;border:1px solid #eee">Data iscrizione</th></tr></thead><tbody>` + uniqueByEmail.map(s => `
            <tr>
                <td style="padding:8px;border:1px solid #eee">${s.username || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.indirizzo ? s.indirizzo : ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.cap || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.city || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.country || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.telefono}</td>
                <td style="padding:8px;border:1px solid #eee">${s.email}</td>
                <td style="padding:8px;border:1px solid #eee">${s.iscrittoIl}</td>
            </tr>`).join('') + '</tbody></table>';
            }
            modal.style.display = 'flex';
        }

        function closeSubscribers() {
            document.getElementById('subscribers-modal').style.display = 'none';
        }

        let currentFilter = 'all';


        // --- INTEGRAZIONE FIREBASE ---
        // Assumiamo che la configurazione Firebase sia già caricata (come in index.html)

        function loadMessages() {
            const messagesList = document.getElementById('messages-list');
            // Carica messaggi da Firebase in tempo reale
            if (typeof db !== 'undefined') {
                db.ref(CHAT_DB_PATH).on('value', snapshot => {
                    const messages = Object.values(snapshot.val() || {}).sort((a, b) => b.timestamp - a.timestamp);
                    displayMessages(messages);
                });
            } else {
                // Fallback su localStorage
                const localMessages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
                displayMessages(localMessages);
            }
        }

        function loadFromLocalStorage() {
            const messagesList = document.getElementById('messages-list');
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            console.log('📥 Caricati da localStorage:', messages.length, 'messaggi');
            displayMessages(messages);
        }

        function displayMessages(messages) {
            const messagesList = document.getElementById('messages-list');
            console.log('📊 Visualizzo:', messages.length, 'messaggi');

            // Aggiorna statistiche
            document.getElementById('total-messages').textContent = messages.length;
            document.getElementById('unread-messages').textContent = messages.filter(m => !m.letto && !m.operator).length;

            // Applica filtro sulla lettura solo ai messaggi degli utenti
            let filteredMessages = messages.slice();
            if (currentFilter === 'unread') {
                filteredMessages = filteredMessages.filter(m => !m.letto && !m.operator);
            } else if (currentFilter === 'read') {
                filteredMessages = filteredMessages.filter(m => m.letto && !m.operator);
            }

            // Ordina per più recente
            filteredMessages.sort((a, b) => b.timestamp - a.timestamp);

            if (filteredMessages.length === 0) {
                messagesList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h3>Nessun messaggio</h3>
                            <p>I messaggi della chat appariranno qui.</p>
                        </div>
                    `;
                return;
            }

            messagesList.innerHTML = filteredMessages.map(msg => `
                    <div class="message-card ${msg.operator ? 'operator' : 'client'} ${!msg.letto && !msg.operator ? 'unread' : ''}" data-id="${msg.id || msg.timestamp}">
                        <div class="message-header">
                            <div class="message-date">
                                <i class="fas fa-clock"></i>
                                ${msg.data}
                            </div>
                            ${!msg.letto && !msg.operator ? '<span class="message-badge">NUOVO</span>' : ''}
                        </div>
                        <div class="message-body">
                            ${msg.message}
                        </div>
                        <div class="message-actions">
                            ${!msg.operator && !msg.letto ? `<button class="btn btn-success" onclick="markAsRead(${msg.id || msg.timestamp})">
                                <i class="fas fa-check"></i> Segna come letto
                            </button>` : ''}
                            ${!msg.operator ? `<button class="btn btn-primary" onclick="replyToMessage(${msg.id || msg.timestamp})">
                                <i class="fas fa-reply"></i> Rispondi
                            </button>` : ''}
                            <button class="btn btn-danger" onclick="deleteMessage(${msg.id || msg.timestamp})">
                                <i class="fas fa-trash"></i> Elimina
                            </button>
                        </div>
                    </div>
                `).join('');
        }

        function filterMessages(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadMessages();
        }


        function markAsRead(id) {
            // Aggiorna localStorage
            let messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            messages = messages.map(m => {
                if (m.id === id || m.timestamp === id) {
                    m.letto = true;
                }
                return m;
            });
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            console.log('✅ Messaggio segnato come letto:', id);
            setTimeout(() => loadMessages(), 300);
        }

        function markAllRead() {
            const messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            messages.forEach(m => m.letto = true);
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            loadMessages();
        }


        function deleteMessage(id) {
            if (confirm('Sei sicuro di voler eliminare questo messaggio?')) {
                // Rimuovi da localStorage
                let messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
                messages = messages.filter(m => m.id !== id && m.timestamp !== id);
                localStorage.setItem('chatMessages', JSON.stringify(messages));
                console.log('🗑️ Messaggio eliminato:', id);
                setTimeout(() => loadMessages(), 300);
            }
        }


        function clearAllMessages() {
            if (confirm('Sei sicuro di voler eliminare TUTTI i messaggi? Questa azione non può essere annullata.')) {
                db.ref(CHAT_DB_PATH).remove();
            }
        }

        function deleteAllSubscribersAdmin() {
            localStorage.setItem('subscribers', '[]');
            localStorage.setItem('clienti', '[]');
            loadSubscribersAdmin();
            alert('Tutti gli iscritti sono stati cancellati.');
        }

        // Firebase chat realtime
        // Assicurati che il codice di configurazione Firebase sia già incluso in index.html

        const CHAT_DB_PATH = 'chat-mickystore';


        function sendAdminReply(id, reply) {
            if (!reply || reply.trim() === '') {
                alert('Scrivi un messaggio!');
                return;
            }

            console.log('📤 Invio risposta...', { id, reply });

            const newAdminMessage = {
                message: reply,
                timestamp: Date.now(),
                data: new Date().toLocaleString('it-IT'),
                operator: true,
                replyTo: id
            };

            // Aggiorna localStorage
            let messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');

            // Marca il messaggio originale come letto
            messages = messages.map(m => {
                if (m.id === id || m.timestamp === id) {
                    m.letto = true;
                }
                return m;
            });

            // Aggiungi la risposta
            messages.push(newAdminMessage);
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            console.log('✅ Risposta salvata in localStorage');

            // Prova a sincronizzare con Firebase
            if (typeof db !== 'undefined') {
                db.ref(CHAT_DB_PATH).push(newAdminMessage, (error) => {
                    if (error) {
                        console.warn('⚠️ Firebase fallito:', error.message);
                        alert('✅ Risposta salvata. Sarà visibile al cliente.');
                    } else {
                        console.log('✅ Risposta sincronizzata su Firebase');
                    }
                    setTimeout(() => loadMessages(), 300);
                });
            } else {
                alert('✅ Risposta salvata');
                setTimeout(() => loadMessages(), 300);
            }
        }

        function saveAdminReplyToLocalStorage(msgObj) {
            let messages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
            messages.push(msgObj);
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            console.log('💾 Messaggio admin salvato in localStorage');

            // Notifica istantanea al cliente tramite evento custom
            const event = new CustomEvent('adminMessageAdded', {
                detail: {
                    message: msgObj.message,
                    timestamp: msgObj.timestamp
                }
            });
            window.dispatchEvent(event);
            console.log('⚡ Evento adminMessageAdded dispatchato');
        }

        function replyToMessage(id) {
            const reply = prompt('Scrivi la tua risposta:');
            if (reply !== null && reply.trim() !== '') {
                console.log('📝 Risposta inviata a:', id);
                sendAdminReply(id, reply);
            }
        }

        function showOrdersAdmin() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            if (!orders.length) {
                alert('Nessun ordine ricevuto.');
                return;
            }
            let html = '';
            orders.slice().reverse().forEach(order => {
                html += `<div style="border:1px solid #eee;padding:16px;margin-bottom:16px;border-radius:8px;background:#fafafa">
            <b>Cliente:</b> ${order.fullName}<br>
            <b>Email:</b> ${order.email}<br>
            <b>Telefono:</b> ${order.phone}<br>
            <b>Indirizzo:</b> ${order.address}, ${order.city} ${order.cap}, ${order.country}
            <button onclick="navigator.clipboard.writeText('${order.fullName}\n${order.address}\n${order.city} ${order.cap}\n${order.country}');alert('Indirizzo copiato!')" style="margin-left:8px;padding:4px 8px;border-radius:4px;background:#2196f3;color:#fff;border:none;cursor:pointer;font-size:12px"><i class='fas fa-copy'></i> Copia</button><br>
            <b>Prodotti:</b><ul style="margin:8px 0 0 16px">`;
                order.cart.forEach(item => {
                    html += `<li>${item.name} x${item.quantity} (€${(item.price * item.quantity).toFixed(2)})</li>`;
                });
                html += `</ul><b>Totale:</b> €${order.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) + 4.99}<br><b>Data:</b> ${order.timestamp}<br>`;
                html += '</div>';
            });
            html += '</div>';
            const popup = window.open('', '', 'width=700,height=600');
            popup.document.write(`<html><head><title>Ordini Ricevuti</title><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'></head><body style='font-family:sans-serif;background:#f5f5f5;padding:24px'>${html}</body></html>`);
            popup.document.close();
        }

        function showSection(section) {
            document.getElementById('section-messaggi').style.display = section === 'messaggi' ? 'block' : 'none';
            document.getElementById('section-iscritti').style.display = section === 'iscritti' ? 'block' : 'none';
            document.getElementById('section-ordini').style.display = section === 'ordini' ? 'block' : 'none';
            if (section === 'iscritti') loadSubscribersAdmin();
            if (section === 'ordini') loadOrdersAdmin();
        }

        function loadSubscribersAdmin() {
            const list = document.getElementById('subscribers-list');
            const fakeEmails = ['mario.rossi@email.com', 'luca.bianchi@email.com', 'giulia.verdi@email.com'];
            const storedSubs = JSON.parse(localStorage.getItem('subscribers') || '[]');
            const filteredSubs = storedSubs.filter(s => !fakeEmails.includes((s.email || '').toLowerCase()));
            const clienti = JSON.parse(localStorage.getItem('clienti') || '[]');
            const filteredClienti = clienti.filter(c => !fakeEmails.includes((c.email || '').toLowerCase()));
            const today = new Date().toLocaleDateString('it-IT');
            const subsWithDate = filteredSubs.map(s => ({ ...s, iscrittoIl: s.iscrittoIl || s.subscribedOn || today }));
            const clientiWithDate = filteredClienti.map(c => ({ ...c, iscrittoIl: c.iscrittoIl || c.subscribedOn || today }));
            localStorage.setItem('subscribers', JSON.stringify(subsWithDate));
            localStorage.setItem('clienti', JSON.stringify(clientiWithDate));
            const clientiSubs = clientiWithDate.map(c => ({ username: c.username, email: c.email, telefono: c.telefono || c.phone || '', indirizzo: c.address || c.indirizzo || '', cap: c.cap || '', city: c.city || '', country: c.country || '', isCliente: true, iscrittoIl: c.iscrittoIl }));
            const normalize = item => ({ username: item.username, email: item.email || item.mail || '', telefono: item.telefono || item.phone || '', indirizzo: item.address || item.indirizzo || '', cap: item.cap || '', city: item.city || '', country: item.country || '', isCliente: item.isCliente || false, isSubscriber: item.isSubscriber || false, iscrittoIl: item.iscrittoIl || item.subscribedOn || today });
            const merged = [...filteredSubs.map(normalize), ...clientiSubs.map(normalize)];
            const uniqueByEmail = Object.values(merged.reduce((acc, item) => { if (!item.email) return acc; if (!acc[item.email]) acc[item.email] = item; return acc; }, {}));
            uniqueByEmail.sort((a, b) => a.username.localeCompare(b.username));
            if (uniqueByEmail.length === 0) {
                list.innerHTML = '<li>Nessun iscritto trovato.</li>';
            } else {
                list.innerHTML = `<table style="width:100%;border-collapse:collapse;margin-top:10px"><thead><tr style="background:#f5f5f5"><th style="padding:8px;border:1px solid #eee">Username</th><th style="padding:8px;border:1px solid #eee">Indirizzo</th><th style="padding:8px;border:1px solid #eee">CAP</th><th style="padding:8px;border:1px solid #eee">Città</th><th style="padding:8px;border:1px solid #eee">Paese</th><th style="padding:8px;border:1px solid #eee">Numero</th><th style="padding:8px;border:1px solid #eee">Mail</th><th style="padding:8px;border:1px solid #eee">Data iscrizione</th></tr></thead><tbody>` + uniqueByEmail.map(s => `
            <tr>
                <td style="padding:8px;border:1px solid #eee">${s.username || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.indirizzo ? s.indirizzo : ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.cap || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.city || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.country || ''}</td>
                <td style="padding:8px;border:1px solid #eee">${s.telefono}</td>
                <td style="padding:8px;border:1px solid #eee">${s.email}</td>
                <td style="padding:8px;border:1px solid #eee">${s.iscrittoIl}</td>
            </tr>`).join('') + '</tbody></table>';
            }
        }

        function loadOrdersAdmin() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const ordersList = document.getElementById('orders-list-admin');
            if (!orders.length) { ordersList.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><h3>Nessun ordine ricevuto</h3><p>Gli ordini dei clienti appariranno qui quando verranno effettuati.</p></div>'; return; }
            let html = '';
            orders.slice().reverse().forEach(order => {
                html += `<div style="border:1px solid #eee;padding:16px;margin-bottom:16px;border-radius:8px;background:#fafafa">
            <b>Cliente:</b> ${order.fullName}<br>
            <b>Email:</b> ${order.email}<br>
            <b>Telefono:</b> ${order.phone}<br>
            <b>Indirizzo:</b> ${order.address}, ${order.city} ${order.cap}, ${order.country}
            <button onclick="navigator.clipboard.writeText('${order.fullName}\n${order.address}\n${order.city} ${order.cap}\n${order.country}');alert('Indirizzo copiato!')" style="margin-left:8px;padding:4px 8px;border-radius:4px;background:#2196f3;color:#fff;border:none;cursor:pointer;font-size:12px"><i class='fas fa-copy'></i> Copia</button><br>
            <b>Prodotti:</b><ul style="margin:8px 0 0 16px">`;
                order.cart.forEach(item => {
                    html += `<li>${item.name} x${item.quantity} (€${(item.price * item.quantity).toFixed(2)})</li>`;
                });
                html += `</ul><b>Totale:</b> €${order.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) + 4.99}<br><b>Data:</b> ${order.timestamp}<br>`;
                html += '</div>';
            });
            ordersList.innerHTML = html;
        }

        // Carica messaggi in realtime
        loadMessages();

        // Auto-refresh ogni 2 secondi per controllare nuovi messaggi
        setInterval(() => {
            console.log('🔄 Aggiornamento automatico messaggi...');
            loadFromLocalStorage();
        }, 2000);
    </script>
</body>
